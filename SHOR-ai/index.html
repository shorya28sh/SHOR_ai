<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOR.ai — Talk. Imagine. See.</title>
<style>
  :root{
    --bg: #0B0E14;
    --bg-panel: #12161F;
    --bg-input: #171C27;
    --accent: #7CFFCB;
    --accent-dim: #3E8A6E;
    --violet: #9B8CFF;
    --text: #E9EDF3;
    --text-dim: #8A92A3;
    --border: #232838;
    --danger: #FF6B6B;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(155,140,255,0.10), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(124,255,203,0.08), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family: 'Söhne', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  @font-face{
    font-family:'Display';
    src:local('Georgia');
  }
  header{
    padding:18px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--border);
    background:rgba(11,14,20,0.85);
    backdrop-filter:blur(8px);
    position:sticky;
    top:0;
    z-index:10;
  }
  .logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-family: Georgia, 'Times New Roman', serif;
    font-size:22px;
    letter-spacing:0.5px;
  }
  .logo .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 12px var(--accent);
    animation:pulse 2.4s infinite ease-in-out;
  }
  @keyframes pulse{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:0.5; transform:scale(0.7);}
  }
  .tagline{
    color:var(--text-dim);
    font-size:12.5px;
    letter-spacing:0.3px;
  }
  .modes{
    display:flex;
    gap:6px;
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:4px;
  }
  .mode-btn{
    background:transparent;
    border:none;
    color:var(--text-dim);
    padding:8px 16px;
    border-radius:7px;
    font-size:13.5px;
    cursor:pointer;
    transition:all .2s ease;
    font-weight:500;
  }
  .mode-btn.active{
    background:var(--accent);
    color:#0B0E14;
    font-weight:600;
  }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    max-width:820px;
    width:100%;
    margin:0 auto;
    padding:24px 20px 0;
    min-height:0;
  }
  #chat-window{
    flex:1;
    overflow-y:auto;
    padding:8px 4px 20px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .msg{
    max-width:78%;
    padding:12px 16px;
    border-radius:14px;
    line-height:1.5;
    font-size:15px;
    white-space:pre-wrap;
    animation:rise .3s ease;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
  }
  .msg.user{
    align-self:flex-end;
    background:linear-gradient(135deg, var(--violet), #7A6FE0);
    color:#fff;
    border-bottom-right-radius:4px;
  }
  .msg.bot{
    align-self:flex-start;
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-bottom-left-radius:4px;
  }
  .msg.bot .label{
    display:block;
    font-size:11px;
    color:var(--accent);
    margin-bottom:4px;
    letter-spacing:0.5px;
    font-weight:600;
  }
  .msg img{
    max-width:100%;
    border-radius:10px;
    margin-top:8px;
    display:block;
  }
  .msg.system{
    align-self:center;
    color:var(--text-dim);
    font-size:12.5px;
    background:none;
    border:none;
    text-align:center;
  }
  .typing{
    display:flex;
    gap:4px;
    padding:4px 0;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--text-dim);
    animation:blink 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{
    0%,80%,100%{opacity:0.2;}
    40%{opacity:1;}
  }
  #input-bar{
    display:flex;
    gap:10px;
    padding:16px 4px 22px;
    border-top:1px solid var(--border);
  }
  #input-bar input{
    flex:1;
    background:var(--bg-input);
    border:1px solid var(--border);
    color:var(--text);
    padding:14px 16px;
    border-radius:12px;
    font-size:15px;
    outline:none;
    transition:border .2s;
  }
  #input-bar input:focus{
    border-color:var(--accent);
  }
  #input-bar input::placeholder{color:var(--text-dim);}
  #send-btn{
    background:var(--accent);
    color:#0B0E14;
    border:none;
    padding:0 22px;
    border-radius:12px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:transform .15s, opacity .15s;
  }
  #send-btn:hover{transform:translateY(-1px);}
  #send-btn:disabled{opacity:0.5; cursor:not-allowed;}
  .hint{
    text-align:center;
    color:var(--text-dim);
    font-size:11.5px;
    padding-bottom:10px;
  }
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}

  .video-note{
    align-self:flex-start;
    background:var(--bg-panel);
    border:1px dashed var(--violet);
    padding:12px 16px;
    border-radius:14px;
    font-size:13.5px;
    color:var(--text-dim);
    max-width:78%;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo"><span class="dot"></span>SHOR<span style="color:var(--accent)">.ai</span></div>
    <div class="tagline">talk · imagine · see</div>
  </div>
  <div class="modes">
    <button class="mode-btn active" data-mode="chat">Chat</button>
    <button class="mode-btn" data-mode="image">Image</button>
    <button class="mode-btn" data-mode="video">Video</button>
  </div>
</header>

<main>
  <div id="chat-window"></div>
  <div id="input-bar">
    <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>
  <div class="hint">Chat mode → talk normally. Image mode → describe what to generate. Video mode → concept preview (full generation needs a video-model API key).</div>
</main>

<script>
const chatWindow = document.getElementById('chat-window');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const modeButtons = document.querySelectorAll('.mode-btn');

let mode = 'chat';
let history = [];

modeButtons.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    modeButtons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    const placeholders = {
      chat: "Ask me anything...",
      image: "Describe the image you want... e.g. 'a cyberpunk fox in neon rain'",
      video: "Describe the video concept... e.g. 'drone shot over a sunset city'"
    };
    input.placeholder = placeholders[mode];
  });
});

function addMessage(role, content, isHTML=false){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if(role === 'bot'){
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = 'SHOR';
    div.appendChild(label);
  }
  if(isHTML){
    const span = document.createElement('div');
    span.innerHTML = content;
    div.appendChild(span);
  } else {
    div.appendChild(document.createTextNode(content));
  }
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return div;
}

function addTyping(){
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = '<span class="label">SHOR</span><div class="typing"><span></span><span></span><span></span></div>';
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById('typing-indicator');
  if(t) t.remove();
}

async function handleChat(text){
  history.push({role:'user', content:text});
  addTyping();
  try{
    const response = await fetch("https://text.pollinations.ai/openai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "openai",
        messages: [
          {role: "system", content: "You are SHOR, a friendly, sharp, helpful AI assistant. Keep answers clear and concise."},
          ...history
        ],
        temperature: 0.7,
        max_tokens: 600,
        stream: false
      })
    });
    if(!response.ok){
      throw new Error('status ' + response.status);
    }
    const data = await response.json();
    removeTyping();
    const reply = data?.choices?.[0]?.message?.content || "Hmm, I couldn't generate a reply just now.";
    history.push({role:'assistant', content: reply});
    addMessage('bot', reply);
  }catch(err){
    removeTyping();
    addMessage('bot', "Something went wrong reaching the model (" + err.message + "). Check your connection and try again.");
    console.error(err);
  }
}

function buildImageUrl(prompt, seed){
  const encoded = encodeURIComponent(prompt);
  return `https://image.pollinations.ai/prompt/${encoded}?seed=${seed}&width=640&height=640&nologo=true&model=flux`;
}

function tryLoadImage(url, timeoutMs){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    let done = false;
    const timer = setTimeout(()=>{
      if(!done){ done = true; reject(new Error('timeout')); }
    }, timeoutMs);
    img.onload = ()=>{
      if(!done){ done = true; clearTimeout(timer); resolve(url); }
    };
    img.onerror = ()=>{
      if(!done){ done = true; clearTimeout(timer); reject(new Error('load-error')); }
    };
    img.src = url;
  });
}

async function handleImage(prompt){
  addTyping();
  const seed = Math.floor(Math.random()*100000);
  const primaryUrl = buildImageUrl(prompt, seed);

  try{
    // First attempt: up to 25s (cold starts on the free model can be slow)
    await tryLoadImage(primaryUrl, 25000);
    removeTyping();
    const div = addMessage('bot', `Here's your image for: "${prompt}"`, false);
    const imgEl = document.createElement('img');
    imgEl.src = primaryUrl;
    div.appendChild(imgEl);
    const link = document.createElement('a');
    link.href = primaryUrl;
    link.target = '_blank';
    link.textContent = 'Open full size ↗';
    link.style.cssText = 'display:block; margin-top:6px; font-size:12px; color:var(--accent);';
    div.appendChild(link);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }catch(err){
    // Retry once with a fresh seed before giving up
    try{
      const retryUrl = buildImageUrl(prompt, seed + 1);
      await tryLoadImage(retryUrl, 20000);
      removeTyping();
      const div = addMessage('bot', `Here's your image for: "${prompt}"`, false);
      const imgEl = document.createElement('img');
      imgEl.src = retryUrl;
      div.appendChild(imgEl);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }catch(err2){
      removeTyping();
      addMessage('bot',
        `Couldn't load the generated image (${err2.message}).\n\n` +
        `This is usually a network/firewall issue blocking image.pollinations.ai — common on conference/hackathon wifi.\n\n` +
        `Try: opening this link directly in a new tab to test:\n${primaryUrl}`
      );
      console.error('Image generation failed:', err, err2);
    }
  }
}

async function loadFrameWithRetry(prompt, angle, attempts){
  for(let a=0; a<attempts; a++){
    const seed = Math.floor(Math.random()*100000) + a;
    const url = buildImageUrl(`${prompt}, ${angle}, cinematic lighting`, seed);
    try{
      await tryLoadImage(url, 20000);
      return url;
    }catch(e){
      // brief pause before retrying, helps with rate limiting
      await new Promise(r=>setTimeout(r, 800));
    }
  }
  return null; // signal total failure for this frame
}

async function handleVideo(prompt){
  const progressDiv = addMessage('bot', 'Generating frame 1 of 4...');
  try{
    const frameCount = 4;
    const frameDuration = 2400; // ms per frame
    const angles = ["establishing wide shot", "cinematic close-up", "dynamic angle shot", "slow tracking shot"];

    const urls = [];
    for(let i=0; i<frameCount; i++){
      progressDiv.lastChild.textContent = `Generating frame ${i+1} of ${frameCount}...`;
      // load frames one at a time (not in parallel) to avoid rate-limiting the free API
      const url = await loadFrameWithRetry(prompt, angles[i % angles.length], 2);
      if(url){
        urls.push(url);
      } else if(urls.length > 0){
        urls.push(urls[urls.length - 1]); // reuse last good frame instead of failing
      }
    }

    if(urls.length === 0){
      throw new Error('no frames loaded');
    }

    progressDiv.remove();
    const div = addMessage('bot', `Here's your AI video for: "${prompt}" — ${urls.length} generated frames stitched into motion.`, false);

    const player = document.createElement('div');
    player.style.cssText = 'position:relative; width:100%; max-width:480px; aspect-ratio:1/1; border-radius:10px; overflow:hidden; background:#000; margin-top:8px;';
    const frameEls = urls.map((src)=>{
      const img = document.createElement('img');
      img.src = src;
      img.style.cssText = 'position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transform:scale(1); transition:opacity 0.8s ease;';
      player.appendChild(img);
      return img;
    });
    const badge = document.createElement('div');
    badge.textContent = '▶ AI motion sequence';
    badge.style.cssText = 'position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.55); color:var(--accent); font-size:11px; padding:4px 8px; border-radius:6px; letter-spacing:0.3px;';
    player.appendChild(badge);
    div.appendChild(player);
    chatWindow.scrollTop = chatWindow.scrollHeight;

    let i = 0;
    function playFrame(idx){
      frameEls.forEach((el,j)=>{
        if(j === idx){
          el.style.transition = 'none';
          el.style.transform = 'scale(1)';
          void el.offsetWidth; // force reflow
          el.style.opacity = '1';
          el.style.transition = `opacity 0.8s ease, transform ${frameDuration}ms linear`;
          requestAnimationFrame(()=>{ el.style.transform = 'scale(1.15)'; });
        } else {
          el.style.opacity = '0';
        }
      });
    }
    playFrame(0);
    setInterval(()=>{
      i = (i + 1) % frameEls.length;
      playFrame(i);
    }, frameDuration);

  }catch(err){
    progressDiv.remove();
    addMessage('bot', `Couldn't render the video frames (${err.message}). The free image service may be rate-limited right now — wait a few seconds and try again.`);
    console.error(err);
  }
}

async function send(){
  const text = input.value.trim();
  if(!text) return;
  addMessage('user', text);
  input.value = '';
  sendBtn.disabled = true;

  if(mode === 'chat'){
    await handleChat(text);
  } else if(mode === 'image'){
    await handleImage(text);
  } else if(mode === 'video'){
    await handleVideo(text);
  }
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') send();
});

addMessage('system', 'SHOR.ai is online. Switch modes above — Chat, Image, or Video — then type your request.');
</script>

</body>
</html>
